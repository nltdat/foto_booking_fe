version: "3.9"

services:
  potonow-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: potonow-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
